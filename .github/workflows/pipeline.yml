name: testWeather
# test
on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
  - cron: "0 0 * * *"

jobs:
  weather:

    strategy:
      matrix:
        city: [London,Tokyo,NYC]
    runs-on: ubuntu-latest
    steps:
      - name: fetch weather
     
        run: |
          WEATHER=$(curl -s "wttr.in/${{matrix.city}}?format=3")
          echo "weather in ${{matrix.city}}: $WEATHER"

          echo "## ${{matrix.city}} Weather" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**$WEATHER**" >> $GITHUB_STEP_SUMMARY

          echo "## ${{matrix.city}} Weather" >> out.txt
          echo "" >> out.txt
          echo "**$WEATHER**" >> out.txt
      - uses: actions/upload-artifact@v4
        with:
          name: weatherReport-${{matrix.city}}
          path: out.txt
